<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow | Productivity Manager</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">


    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">
        <header>

            <div class="logo">

                <i class="fa-solid fa-list-check"></i>

                <div>

                    <h1>TaskFlow</h1>

                    <p>Organize your work efficiently.</p>

                </div>

            </div>

            <button id="themeToggle" aria-label="Toggle Theme">

                <i class="fa-solid fa-moon"></i>

            </button>

        </header>

        <section class="hero">
            <h2 id="greeting">Welcome</h2>
            <p>Stay focused. Finish your important tasks today.</p>
        </section>


        <section class="dashboard">

            <div class="card">

                <i class="fa-solid fa-list"></i>

                <div>

                    <span>Total Tasks</span>

                    <h2 id="totalTasks">0</h2>

                </div>

            </div>

            <div class="card">

                <i class="fa-solid fa-hourglass-half"></i>

                <div>

                    <span>Pending</span>

                    <h2 id="pendingCount">0</h2>

                </div>

            </div>

            <div class="card">

                <i class="fa-solid fa-circle-check"></i>

                <div>

                    <span>Completed</span>

                    <h2 id="completedCount">0</h2>

                </div>

            </div>

        </section>

        <section class="search-section">

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search tasks..."
                >
            </div>
        </section>

        <section class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter your task..."
            >

            <select id="prioritySelect">

                <option value="low">Low Priority</option>

                <option value="medium">Medium Priority</option>

                <option value="high">High Priority</option>

            </select>

            <button id="addBtn">

                <i class="fa-solid fa-plus"></i>

                Add Task

            </button>

        </section>

        <section class="filters">

            <button class="active" data-filter="all">

                All

            </button>

            <button data-filter="pending">

                Pending

            </button>

            <button data-filter="completed">

                Completed

            </button>

            <button data-filter="high">

                High Priority

            </button>

        </section>

        <section class="tasks-section">

            <div class="section-heading">

                <h2>

                    My Tasks

                </h2>

            </div>

            <ul id="taskList">

            </ul>

            <div id="emptyState">

                <i class="fa-regular fa-clipboard"></i>

                <h3>No Tasks Yet</h3>

                <p>

                    Start by adding your first task and stay productive.

                </p>

            </div>

        </section>

        <footer>

            <p>

                Built with &hearts; using HTML, CSS & JavaScript

            </p>

        </footer>

    </div>

    <script src="app.js"></script>

</body>

</html>
